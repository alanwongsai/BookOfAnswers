    /* ── Theme Tokens ─────────────────────────────── */

      --bg:           #f6faf3;
      --surface:      #ffffff;
      --surface-soft: #edf5e9;
      --surface-high: #dfeadd;
      --card-bg:      #fffdf8;
      --primary:      #4b6621;
      --primary-soft: #d6edb1;
      --secondary:    #75546f;
      --secondary-soft:#f0d7eb;
      --tertiary:     #006d78;
      --tertiary-soft:#bdebf0;
      --gold:         #806900;
      --gold-light:   #d9c56b;
      --text:         #171d14;
      --text-muted:   #5b6655;
      --text-faint:   #8a9484;
      --border:       #c7cec0;
      --shadow:       0 18px 46px rgba(38, 55, 33, 0.14), 0 2px 8px rgba(38, 55, 33, 0.08);
      --pill-bg:      #edf5e9;
      --pill-active:  #d6edb1;
      --pill-text:    #1b230f;
      --btn-bg:       #4b6621;
      --btn-text:     #ffffff;
    }

    [data-theme="dark"] {
      --bg:           #11140f;
      --surface:      #1c2118;
      --surface-soft: #242c20;
      --surface-high: #303928;
      --card-bg:      #20261c;
      --primary:      #badd8f;
      --primary-soft: #3a4a22;
      --secondary:    #e2bbd8;
      --secondary-soft:#4c3548;
      --tertiary:     #8fd6df;
      --tertiary-soft:#21494e;
      --gold:         #ddc75f;
      --gold-light:   #f1df88;
      --text:         #eef2e8;
      --text-muted:   #c0c9b8;
      --text-faint:   #828c7b;
      --border:       #495241;
      --shadow:       0 22px 58px rgba(0,0,0,0.42), 0 2px 10px rgba(0,0,0,0.32);
      --pill-bg:      #242c20;
      --pill-active:  #3a4a22;
      --pill-text:    #eef2e8;
      --btn-bg:       #badd8f;
      --btn-text:     #1d280e;
    }

    /* ── Reset ────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Body ─────────────────────────────────────── */
    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      background:
        linear-gradient(158deg, #f6faf3 0 42%, #eaf4ec 42% 68%, #f6eef8 68% 100%);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: max(18px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(34px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      transition: background 0.5s ease, color 0.5s ease;
    }

    [data-theme="dark"] body {
      background:
        linear-gradient(158deg, #11140f 0 42%, #182018 42% 68%, #211824 68% 100%);
    }

    /* ── Top Bar ──────────────────────────────────── */
    .top-bar {
      width: 100%;
      max-width: 500px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-bottom: clamp(22px, 5svh, 44px);
    }

    .top-btn {
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: 0;
      color: var(--text-muted);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(38, 55, 33, 0.08);
      transition: color 0.25s, border-color 0.25s, background 0.25s, transform 0.25s;
      user-select: none;
    }

    .top-btn:hover {
      color: var(--primary);
      border-color: var(--primary);
      transform: translateY(-1px);
    }

    /* ── Main Container ───────────────────────────── */
    .container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Book Tabs ────────────────────────────────── */
    .book-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: clamp(22px, 5.5svh, 52px);
      flex-wrap: wrap;
      justify-content: center;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-soft);
      box-shadow: 0 8px 26px rgba(38, 55, 33, 0.08);
    }

    .book-tab {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 14px;
      font-family: 'Libre Baskerville', Georgia, 'Times New Roman', serif;
      font-weight: 400;
      letter-spacing: 0;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
      user-select: none;
    }

    .book-tab.active {
      background: var(--pill-active);
      border-color: transparent;
      color: var(--pill-text);
      box-shadow: 0 4px 14px rgba(75, 102, 33, 0.20);
    }

    .book-tab:hover:not(.active) {
      background: var(--surface-high);
      color: var(--primary);
      transform: translateY(-1px);
    }

    /* ── Book Title ───────────────────────────────── */
    .book-title {
      font-family: 'Libre Baskerville', Georgia, 'Times New Roman', serif;
      font-size: clamp(25px, 7.2vw, 36px);
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      color: var(--text);
      margin-bottom: clamp(20px, 4.4svh, 38px);
      text-align: center;
      line-height: 1.15;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    /* ── Card Scene ───────────────────────────────── */
    .card-scene {
      perspective: 1400px;
      width: clamp(220px, min(78vw, 38svh), 300px);
      aspect-ratio: 10 / 16;
      margin-bottom: clamp(22px, 4.8svh, 44px);
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.9s cubic-bezier(0.45, 0.05, 0.15, 1.0);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 8px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(28px, 7svh, 44px) clamp(24px, 8vw, 36px);
      transition: background 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
    }

    .card-back {
      transform: rotateY(180deg);
    }

    .card-face::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 8px;
      border-radius: 8px 8px 0 0;
      pointer-events: none;
      background: linear-gradient(90deg, var(--primary), var(--tertiary), var(--secondary));
      opacity: 0.92;
    }

    .card-face > * {
      position: relative;
      z-index: 1;
    }

    /* subtle hover lift */
    .card-scene:hover .card:not(.flipped) .card-front {
      box-shadow: var(--shadow), 0 0 0 1px var(--border);
    }

    /* ── Card Front ───────────────────────────────── */
    .ornament {
      font-size: 28px;
      color: var(--gold);
      margin-bottom: 20px;
      line-height: 1;
      user-select: none;
    }

    .divider {
      width: 36px;
      height: 1px;
      background: var(--gold);
      opacity: 0.45;
      margin: 14px auto;
      flex-shrink: 0;
    }

    .card-prompt {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 15px;
      line-height: 1.75;
      color: var(--text-muted);
      text-align: center;
    }

    .card-hint {
      margin-top: 20px;
      font-size: 10px;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    /* ── Card Back ────────────────────────────────── */
    .answer-text {
      font-family: 'Playfair Display', serif;
      font-size: 21px;
      font-weight: 600;
      line-height: 1.55;
      text-align: center;
      color: var(--text);
      transition: color 0.5s ease;
    }

    [data-theme="dark"] .answer-text {
      color: var(--gold);
    }

    /* ── Ask Button ───────────────────────────────── */
    .ask-btn {
      background: var(--btn-bg);
      color: var(--btn-text);
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 15px 44px;
      font-size: 12.5px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      letter-spacing: 0;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(75, 102, 33, 0.26);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.5s ease, color 0.5s ease;
      user-select: none;
    }

    .ask-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(75, 102, 33, 0.32);
    }

    [data-theme="dark"] .ask-btn:hover {
      box-shadow: 0 12px 30px rgba(0,0,0,0.36);
    }

    .ask-btn:active {
      transform: translateY(-1px);
    }

    /* ── Footer ───────────────────────────────────── */
    .footer {
      margin-top: 64px;
      font-size: 10.5px;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--text-faint);
      text-align: center;
    }

    /* ── Responsive ───────────────────────────────── */
    @media (max-height: 760px) {
      body { padding-bottom: max(22px, env(safe-area-inset-bottom)); }
      .footer { margin-top: 40px; }
    }

    @media (max-width: 380px) {
      .card-scene {
        width: clamp(220px, min(84vw, 40svh), 280px);
        aspect-ratio: 10 / 13.2;
      }
      .book-tabs { gap: 6px; padding: 6px; }
      .book-tab { padding: 7px 12px; font-size: 12.5px; }
      .ask-btn { width: min(100%, 260px); padding-inline: 24px; }
    }

    @media (max-height: 680px) {
      .top-bar { margin-bottom: 16px; }
      .book-tabs { margin-bottom: 16px; }
      .book-title { margin-bottom: 14px; }
      .card-scene {
        width: clamp(190px, min(76vw, 36svh), 250px);
        aspect-ratio: 10 / 12.8;
      }
      .card-hint { margin-top: 14px; }
      .ornament { font-size: 24px; margin-bottom: 14px; }
      .footer { display: none; }
      .answer-text { font-size: 19px; line-height: 1.45; }
      .card-prompt { font-size: 14px; line-height: 1.6; }
    }
  </style>
</head>

  // ── State ──────────────────────────────────────────────────────────────────
  const state = {
    theme:    "light",
    lang:     "en",
    book:     "classic",
    flipped:  false,
    lastIdx:  -1
  };

  // ── Elements ───────────────────────────────────────────────────────────────
  const $html        = document.documentElement;
  const $card        = document.getElementById("card");
  const $cardScene   = document.getElementById("card-scene");
  const $bookTitle   = document.getElementById("book-title");
  const $ornament    = document.getElementById("card-ornament");
  const $prompt      = document.getElementById("card-prompt");
  const $hint        = document.getElementById("card-hint");
  const $answer      = document.getElementById("answer-text");
  const $askBtn      = document.getElementById("ask-btn");
  const $langToggle  = document.getElementById("lang-toggle");
  const $themeToggle = document.getElementById("theme-toggle");
  const $footer      = document.getElementById("footer");
  const $tabs        = document.querySelectorAll(".book-tab");
  const $tabClassic  = document.getElementById("tab-classic");
  const $tabAudit    = document.getElementById("tab-audit");
  const $tabRel      = document.getElementById("tab-relationship");

  // ── Helpers ────────────────────────────────────────────────────────────────
  function currentData() {
    return BOOKS[state.book][state.lang];
  }

  function randomAnswer() {
    const list = currentData().answers;
    let idx;
    do { idx = Math.floor(Math.random() * list.length); }
    while (idx === state.lastIdx && list.length > 1);
    state.lastIdx = idx;
    return list[idx];
  }

  // ── Render UI ──────────────────────────────────────────────────────────────
  function render(fadeTitle = false) {
    const d = currentData();

    // Title
    if (fadeTitle) {
      $bookTitle.style.opacity = "0";
      setTimeout(() => {
        $bookTitle.textContent = d.name;
        $bookTitle.style.opacity = "1";
      }, 280);
    } else {
      $bookTitle.textContent = d.name;
    }

    // Card front
    $ornament.textContent = d.ornament;
    $prompt.textContent   = d.prompt;
    $hint.textContent     = d.hint;

    // Button
    $askBtn.textContent = state.flipped ? d.againBtn : d.askBtn;

    // If answer is visible, re-render it in new language (same index)
    if (state.flipped && state.lastIdx >= 0) {
      $answer.textContent = BOOKS[state.book][state.lang].answers[state.lastIdx];
    }

    // Tabs
    $tabClassic.textContent = state.lang === "en" ? "Classic"    : "经典";
    $tabAudit.textContent   = state.lang === "en" ? "Audit Life" : "审计人生";
    $tabRel.textContent     = state.lang === "en" ? "Heart"      : "心语";

    // Toggles
    $langToggle.textContent  = state.lang   === "en"    ? "中文"    : "English";
    $themeToggle.textContent = state.theme  === "light"
      ? (state.lang === "en" ? "☽ Night" : "☽ 夜间")
      : (state.lang === "en" ? "☀ Day"   : "☀ 日间");

    // Footer
    $footer.textContent = d.name;

    // html lang attribute
    $html.lang = state.lang === "en" ? "en" : "zh-Hans";
  }

  // ── Flip Logic ─────────────────────────────────────────────────────────────
  function flipToAnswer() {
    $answer.textContent = randomAnswer();
    state.flipped = true;
    $card.classList.add("flipped");
    $askBtn.textContent = currentData().againBtn;
  }

  function flipToFront() {
    state.flipped = false;
    $card.classList.remove("flipped");
    $askBtn.textContent = currentData().askBtn;
  }

  function handleAsk() {
    state.flipped ? flipToFront() : flipToAnswer();
  }

  // ── Events ─────────────────────────────────────────────────────────────────
  $cardScene.addEventListener("click", handleAsk);
  $askBtn.addEventListener("click", (e) => { e.stopPropagation(); handleAsk(); });

  $tabs.forEach(tab => {
    tab.addEventListener("click", () => {
      const book = tab.dataset.book;
      if (book === state.book) return;
      state.book    = book;
      state.lastIdx = -1;
      if (state.flipped) flipToFront();
      $tabs.forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      render(true);
    });
  });

  $langToggle.addEventListener("click", () => {
    state.lang = state.lang === "en" ? "zh" : "en";
    render(false);
  });

  $themeToggle.addEventListener("click", () => {
    state.theme = state.theme === "light" ? "dark" : "light";
    $html.setAttribute("data-theme", state.theme);
    render(false);
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  render(false);

  // ── PWA: Register Service Worker ───────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
  </script>
