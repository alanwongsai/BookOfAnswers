<!DOCTYPE html>
<html lang="en" data-theme="dark" data-book="classic">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Book of Answers</title>
  <meta name="description" content="Ask a question. Open the portal. Receive your answer." />
  <meta name="theme-color" content="#09080b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Book of Answers" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Libre+Baskerville:wght@400;700&family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="cosmos" aria-hidden="true"></div>
  <div class="ambient-orbit" aria-hidden="true"></div>

  <!-- Hidden legacy elements preserved for JS compatibility -->
  <span id="brand-label" hidden></span>
  <div id="footer" hidden></div>

  <div class="app-shell">

    <header class="utility-rail" aria-label="Settings">
      <div class="utility-group">
        <button class="util-btn" type="button" id="theme-toggle">☀ Day</button>
        <div class="util-sep" aria-hidden="true"></div>
        <button class="util-btn" type="button" id="lang-toggle">中文</button>
      </div>
    </header>

    <main class="oracle-column">

      <section class="title-block" aria-labelledby="book-title">
        <h1 class="book-title" id="book-title">The Book of Answers</h1>
        <div class="eyebrow" id="book-eyebrow">A quiet answer awaits</div>
      </section>

      <nav class="category-control" aria-label="Book category">
        <button class="cat-tab active" type="button" data-book="classic"      id="tab-classic"      aria-pressed="true" ><span>Classic</span></button>
        <button class="cat-tab"        type="button" data-book="audit"         id="tab-audit"         aria-pressed="false"><span>Audit Life</span></button>
        <button class="cat-tab"        type="button" data-book="relationship"  id="tab-relationship"  aria-pressed="false"><span>Heart</span></button>
      </nav>

      <section class="oracle-stage" aria-label="Answer reveal">
        <div class="card-scene" id="card-scene" role="button" tabindex="0" aria-label="Reveal an answer">
          <div class="card" id="card">

            <div class="card-face card-front">
              <div class="ornament" id="card-ornament">&#10022;</div>
              <div class="divider"></div>
              <div class="card-prompt" id="card-prompt">Hold your question in mind, then reveal your answer.</div>
              <div class="divider"></div>
              <div class="card-hint" id="card-hint">tap to reveal</div>
            </div>

            <div class="card-face card-back">
              <div class="divider"></div>
              <div class="answer-text" id="answer-text" aria-live="polite"></div>
              <div class="divider"></div>
              <div class="answer-meta">
                <span class="answer-label" id="answer-label">Answer</span>
                <span class="answer-count" id="answer-count"></span>
              </div>
            </div>

          </div>
        </div>
      </section>

      <div class="action-zone">
        <button class="ask-btn" type="button" id="ask-btn">Ask the Book</button>
        <p class="helper-copy" id="helper-copy">Let the question settle. When the surface feels still, ask once.</p>
      </div>

    </main>
  </div>

  <script src="./data/classic.js"></script>
  <script src="./data/audit.js"></script>
  <script src="./data/relationship.js"></script>
  <script src="./app.js"></script>

</body>
</html>
