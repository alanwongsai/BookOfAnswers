<!DOCTYPE html>
<html lang="en" data-theme="dark" data-book="classic">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Book of Answers</title>
  <meta name="description" content="Ask a question. Open the portal. Receive your answer." />
  <meta name="theme-color" content="#040710" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Book of Answers" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Libre+Baskerville:wght@400;700&family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════════════════════
       DESIGN TOKENS — ROOT
    ═══════════════════════════════════════════════════════════ */
    :root {
      color-scheme: dark;

      /* Background layers */
      --bg:        #040710;
      --bg-deep:   #01020a;
      --bg-soft:   #090f1e;

      /* Text hierarchy */
      --text:       rgba(247, 250, 255, 0.94);
      --text-muted: rgba(220, 232, 247, 0.62);
      --text-faint: rgba(220, 232, 247, 0.34);

      /* Accent palette */
      --accent:       #9fcfff;
      --accent-soft:  #d7ecff;
      --accent-deep:  #4b7ca8;

      /* Atmospheric mood glow */
      --mood:   rgba(111, 160, 255, 0.34);
      --mood-2: rgba(172, 154, 255, 0.18);

      /* Structural lines */
      --line:        rgba(218, 238, 255, 0.11);
      --line-strong: rgba(218, 238, 255, 0.24);

      /* ── Glass material system ── */
      /* Oracle chamber (hero glass) */
      --glass-chamber-fill:  rgba(10, 18, 36, 0.54);
      --glass-chamber-edge:  rgba(220, 240, 255, 0.19);
      --glass-chamber-shine: rgba(255, 255, 255, 0.15);

      /* Controls (lighter glass) */
      --glass-ctrl-fill:  rgba(10, 16, 30, 0.50);
      --glass-ctrl-edge:  rgba(220, 240, 255, 0.14);
      --glass-ctrl-shine: rgba(255, 255, 255, 0.09);

      /* ── Spatial depth shadows ── */
      --shadow-chamber: 0 40px 120px rgba(0,0,0,0.56), 0 0 80px var(--mood);
      --shadow-button:  0 20px 60px var(--mood), inset 0 1px 0 rgba(255,255,255,0.58);
      --shadow-ctrl:    0 6px 24px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.07);

      /* Button text */
      --button-text: #06101b;

      /* Typography */
      --font-ui:      'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-display: 'Cinzel', 'Libre Baskerville', Georgia, serif;
      --font-answer:  'Cormorant Garamond', 'Noto Serif SC', 'Songti SC', serif;

      /* Radii */
      --r-chamber: 22px;
      --r-pill:    50px;

      /* Motion */
      --ease-liquid: cubic-bezier(0.18, 0.86, 0.18, 1);
      --ease-emerge: cubic-bezier(0.32, 0.72, 0.00, 1.00);
      --ease-settle: cubic-bezier(0.46, 0.03, 0.52, 0.96);
    }

    /* ── Category mood shifts ── */
    [data-book="audit"] {
      --bg:        #040810;
      --bg-soft:   #09121e;
      --accent:      #a2cfe0;
      --accent-soft: #dff4ff;
      --accent-deep: #4d7d90;
      --mood:   rgba(100, 165, 200, 0.26);
      --mood-2: rgba(168, 204, 218, 0.12);
    }

    [data-book="relationship"] {
      --bg:        #070511;
      --bg-soft:   #13081e;
      --accent:      #d4a8e8;
      --accent-soft: #ffe4ff;
      --accent-deep: #855aa0;
      --mood:   rgba(178, 98, 165, 0.32);
      --mood-2: rgba(108, 78, 190, 0.14);
    }

    /* ── Light theme ── */
    [data-theme="light"] {
      color-scheme: light;
      --bg:        #eef6ff;
      --bg-deep:   #dce9f5;
      --bg-soft:   #f9fcff;
      --text:       rgba(8, 17, 31, 0.90);
      --text-muted: rgba(24, 42, 64, 0.60);
      --text-faint: rgba(24, 42, 64, 0.36);
      --accent:       #457ead;
      --accent-soft:  #0e3858;
      --accent-deep:  #d5ebff;
      --mood:   rgba(75, 136, 184, 0.18);
      --mood-2: rgba(142, 154, 218, 0.16);
      --line:        rgba(18, 50, 82, 0.12);
      --line-strong: rgba(18, 50, 82, 0.23);
      --glass-chamber-fill:  rgba(255, 255, 255, 0.58);
      --glass-chamber-edge:  rgba(40, 100, 160, 0.18);
      --glass-chamber-shine: rgba(255, 255, 255, 0.80);
      --glass-ctrl-fill:  rgba(255, 255, 255, 0.54);
      --glass-ctrl-edge:  rgba(40, 100, 160, 0.14);
      --shadow-chamber: 0 36px 100px rgba(42, 78, 112, 0.18), 0 0 60px var(--mood);
      --shadow-button:  0 18px 52px var(--mood), inset 0 1px 0 rgba(255,255,255,0.80);
      --button-text: #f7fbff;
    }

    [data-theme="light"][data-book="audit"] {
      --accent:       #4b7f91;
      --accent-soft:  #0d3542;
      --accent-deep:  #d5f3fb;
      --mood:   rgba(73, 133, 150, 0.18);
      --mood-2: rgba(89, 123, 138, 0.12);
    }

    [data-theme="light"][data-book="relationship"] {
      --accent:       #975f9d;
      --accent-soft:  #3d1745;
      --accent-deep:  #fae2ff;
      --mood:   rgba(151, 83, 157, 0.17);
      --mood-2: rgba(99, 117, 210, 0.12);
    }

    /* ═══════════════════════════════════════════════════════════
       RESET + BASE
    ═══════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      letter-spacing: 0;
      transition: background 0.85s var(--ease-liquid), color 0.5s ease;
    }

    button {
      font: inherit;
      letter-spacing: 0;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    button:focus-visible,
    [role="button"]:focus-visible {
      outline: 1.5px solid var(--accent);
      outline-offset: 4px;
      border-radius: var(--r-pill);
    }

    /* ═══════════════════════════════════════════════════════════
       COSMOS — ATMOSPHERIC BACKGROUND
    ═══════════════════════════════════════════════════════════ */
    .cosmos {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      /* Layered radial atmosphere — bloom centered behind oracle chamber */
      background:
        radial-gradient(ellipse 78% 55% at 50% 64%, var(--mood) 0, transparent 52%),
        radial-gradient(ellipse at 50% -8%, rgba(92, 113, 205, 0.22) 0, transparent 44%),
        radial-gradient(circle at 18% 44%, var(--mood-2) 0, transparent 32%),
        radial-gradient(circle at 82% 50%, rgba(130, 210, 255, 0.06) 0, transparent 30%),
        linear-gradient(180deg, var(--bg-deep), var(--bg) 40%, var(--bg-soft));
      transition: background 1s var(--ease-liquid);
    }

    /* Star field */
    .cosmos::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.50;
      background-image:
        radial-gradient(circle, rgba(244, 250, 255, 0.52) 0 1px, transparent 1.2px),
        radial-gradient(circle, rgba(202, 225, 255, 0.26) 0 1px, transparent 1.2px);
      background-position: 12% 18%, 72% 26%;
      background-size: 24rem 28rem, 32rem 25rem;
      animation: starDrift 22s ease-in-out infinite alternate;
    }

    [data-theme="light"] .cosmos::before { opacity: 0.18; }

    /* ═══════════════════════════════════════════════════════════
       AMBIENT ORBIT — SPATIAL DEPTH RINGS
    ═══════════════════════════════════════════════════════════ */
    .ambient-orbit {
      position: fixed;
      left: 50%;
      top: 54%;
      z-index: 0;
      width: min(88vw, 800px);
      aspect-ratio: 1;
      border: 1px solid var(--line);
      border-radius: 50%;
      opacity: 0.44;
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: border-color 0.9s ease, opacity 0.7s ease;
    }

    .ambient-orbit::before,
    .ambient-orbit::after {
      content: "";
      position: absolute;
      border: 1px solid var(--line);
      border-radius: 50%;
    }

    .ambient-orbit::before {
      inset: 12%;
      opacity: 0.52;
    }

    .ambient-orbit::after {
      inset: 26%;
      opacity: 0.28;
      border-style: dashed;
      animation: slowTurn 72s linear infinite;
    }

    /* ═══════════════════════════════════════════════════════════
       APP SHELL — OUTER CONTAINER
    ═══════════════════════════════════════════════════════════ */
    .app-shell {
      position: relative;
      z-index: 1;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding:
        max(14px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(22px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
    }

    /* ═══════════════════════════════════════════════════════════
       UTILITY RAIL — TOP CONTROLS
    ═══════════════════════════════════════════════════════════ */
    .utility-rail {
      width: 100%;
      max-width: 640px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      min-height: 46px;
      flex-shrink: 0;
    }

    .utility-group {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 4px;
      border: 1px solid var(--glass-ctrl-edge);
      border-radius: var(--r-pill);
      background: var(--glass-ctrl-fill);
      box-shadow: var(--shadow-ctrl);
      backdrop-filter: blur(16px) saturate(150%);
      -webkit-backdrop-filter: blur(16px) saturate(150%);
      transition: background 0.7s ease, border-color 0.7s ease;
    }

    [data-theme="light"] .utility-group {
      background: rgba(255, 255, 255, 0.64);
    }

    .util-btn {
      min-height: 30px;
      padding: 6px 14px;
      border: 1px solid transparent;
      border-radius: var(--r-pill);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      transition: color 0.22s ease, background 0.22s ease, border-color 0.22s ease;
    }

    .util-btn:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--line);
    }

    [data-theme="light"] .util-btn:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    .util-sep {
      width: 1px;
      height: 14px;
      background: var(--line-strong);
      flex-shrink: 0;
      margin: 0 2px;
    }

    /* ═══════════════════════════════════════════════════════════
       ORACLE COLUMN — CENTERED VERTICAL STAGE
    ═══════════════════════════════════════════════════════════ */
    .oracle-column {
      flex: 1;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 0 6px;
      gap: 0;
    }

    /* ═══════════════════════════════════════════════════════════
       TITLE BLOCK
    ═══════════════════════════════════════════════════════════ */
    .title-block {
      width: 100%;
      text-align: center;
      margin-bottom: 14px;
    }

    .book-title {
      color: var(--text);
      font-family: var(--font-display);
      font-size: clamp(30px, 6.2vw, 60px);
      font-weight: 500;
      letter-spacing: 0.03em;
      line-height: 1.0;
      text-align: center;
      text-wrap: balance;
      text-shadow: 0 0 55px var(--mood);
      margin-bottom: 11px;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.36s ease, transform 0.36s var(--ease-liquid), color 0.5s ease, text-shadow 0.9s ease;
    }

    .book-title.is-changing {
      opacity: 0;
      transform: translateY(8px);
    }

    :lang(zh-Hans) .book-title {
      font-family: 'Noto Serif SC', 'Songti SC', 'STSong', serif;
      font-size: clamp(28px, 5.8vw, 56px);
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1.1;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 11px;
      font-weight: 500;
      line-height: 1.5;
      letter-spacing: 0.10em;
      opacity: 0.80;
      transition: opacity 0.36s ease, color 0.6s ease;
    }

    /* ═══════════════════════════════════════════════════════════
       CATEGORY CONTROL — HORIZONTAL PILL SELECTOR
    ═══════════════════════════════════════════════════════════ */
    .category-control {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 4px;
      border: 1px solid var(--glass-ctrl-edge);
      border-radius: var(--r-pill);
      background: var(--glass-ctrl-fill);
      box-shadow: var(--shadow-ctrl);
      backdrop-filter: blur(14px) saturate(145%);
      -webkit-backdrop-filter: blur(14px) saturate(145%);
      margin-bottom: 18px;
      transition: background 0.7s ease, border-color 0.7s ease;
    }

    [data-theme="light"] .category-control {
      background: rgba(255, 255, 255, 0.60);
    }

    .cat-tab {
      position: relative;
      min-height: 32px;
      padding: 7px 18px;
      border: 1px solid transparent;
      border-radius: var(--r-pill);
      background: transparent;
      color: var(--text-faint);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      transition: color 0.26s ease, background 0.26s ease, border-color 0.26s ease,
                  box-shadow 0.26s ease, text-shadow 0.4s ease;
    }

    .cat-tab:hover {
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.05);
    }

    .cat-tab.active {
      background: rgba(255, 255, 255, 0.10);
      border-color: var(--line-strong);
      color: var(--text);
      box-shadow: 0 2px 14px rgba(0, 0, 0, 0.18), inset 0 1px 0 rgba(255,255,255,0.11);
      text-shadow: 0 0 18px var(--mood);
    }

    [data-theme="light"] .cat-tab.active {
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 2px 12px rgba(42, 78, 112, 0.12), inset 0 1px 0 rgba(255,255,255,0.90);
      text-shadow: none;
    }

    :lang(zh-Hans) .cat-tab {
      font-size: 13px;
      padding: 7px 14px;
    }

    /* ═══════════════════════════════════════════════════════════
       ORACLE STAGE — ATMOSPHERIC RING FRAME
    ═══════════════════════════════════════════════════════════ */
    .oracle-stage {
      position: relative;
      isolation: isolate;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 26px 0;
    }

    /* Outer atmospheric ring — glowing halo */
    .oracle-stage::before {
      content: "";
      position: absolute;
      width: min(90%, 510px);
      aspect-ratio: 1;
      border: 1px solid var(--line);
      border-radius: 50%;
      box-shadow: inset 0 0 70px rgba(255,255,255,0.018), 0 0 80px var(--mood);
      pointer-events: none;
      animation: glowBreath 7s ease-in-out infinite;
      transition: box-shadow 0.9s ease;
    }

    /* Inner dashed ring — slow rotation */
    .oracle-stage::after {
      content: "";
      position: absolute;
      width: min(62%, 330px);
      aspect-ratio: 1;
      border: 1px dashed var(--line);
      border-radius: 50%;
      opacity: 0.36;
      pointer-events: none;
      animation: slowTurn 54s linear infinite;
    }

    /* ═══════════════════════════════════════════════════════════
       CARD SCENE — PERSPECTIVE WRAPPER
    ═══════════════════════════════════════════════════════════ */
    .card-scene {
      position: relative;
      z-index: 2;
      width: min(86vw, 460px);
      cursor: pointer;
    }

    /* ═══════════════════════════════════════════════════════════
       CARD — THE ORACLE CHAMBER (hero glass object)
    ═══════════════════════════════════════════════════════════ */
    .card {
      position: relative;
      width: 100%;
      overflow: hidden;
      border: 1px solid var(--glass-chamber-edge);
      border-radius: var(--r-chamber);
      /* Layered glass material */
      background:
        radial-gradient(ellipse at 50% -5%, rgba(255, 255, 255, 0.20), transparent 42%),
        radial-gradient(circle at 50% 84%, var(--mood), transparent 54%),
        linear-gradient(152deg,
          rgba(255, 255, 255, 0.082) 0%,
          rgba(255, 255, 255, 0.022) 48%,
          rgba(255, 255, 255, 0.058) 100%),
        var(--glass-chamber-fill);
      box-shadow:
        var(--shadow-chamber),
        inset 0 1px 0 var(--glass-chamber-shine),
        inset 0 -1px 0 rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(28px) saturate(168%) brightness(1.06);
      -webkit-backdrop-filter: blur(28px) saturate(168%) brightness(1.06);
      aspect-ratio: 4 / 5;
      max-height: 520px;
      transform: translateY(0);
      transition:
        transform 0.55s var(--ease-liquid),
        border-color 0.5s ease,
        box-shadow 0.55s ease,
        background 0.7s ease;
    }

    /* Shimmer — restrained light sweep */
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.60;
      background:
        linear-gradient(120deg,
          transparent 0 32%,
          rgba(255, 255, 255, 0.15) 43%,
          transparent 54% 100%),
        radial-gradient(circle at 14% 8%, rgba(255, 255, 255, 0.13), transparent 26%);
      transform: translateX(-48%);
      pointer-events: none;
      transition: transform 1.45s var(--ease-liquid), opacity 0.45s ease;
    }

    /* Inner inset frame */
    .card::after {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid var(--line);
      border-radius: calc(var(--r-chamber) - 5px);
      box-shadow: inset 0 0 36px rgba(255, 255, 255, 0.018);
      pointer-events: none;
      transition: border-color 0.5s ease;
    }

    /* Hover + flipped states */
    .card-scene:hover .card,
    .card.flipped {
      transform: translateY(-5px);
      border-color: var(--line-strong);
      box-shadow:
        var(--shadow-chamber),
        0 0 42px var(--mood),
        inset 0 1px 0 var(--glass-chamber-shine);
    }

    .card-scene:hover .card::before,
    .card.flipped::before {
      transform: translateX(42%);
      opacity: 0.88;
    }

    /* Gather state — pre-reveal energy pulse */
    .card.gathering {
      border-color: var(--line-strong);
      box-shadow:
        var(--shadow-chamber),
        0 0 70px var(--mood),
        0 0 120px var(--mood),
        inset 0 1px 0 var(--glass-chamber-shine);
    }

    /* ═══════════════════════════════════════════════════════════
       CARD FACES — FRONT & BACK
    ═══════════════════════════════════════════════════════════ */
    .card-face {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 46px 38px;
      text-align: center;
      transition:
        opacity 0.50s var(--ease-liquid),
        transform 0.50s var(--ease-liquid),
        filter 0.50s ease;
    }

    /* Back face — initial hidden state.
       Uses ease-emerge so the reveal feels like it rises from depth. */
    .card-back {
      opacity: 0;
      transform: translateY(12px) scale(0.988);
      filter: blur(6px);
      pointer-events: none;
      /* Override base transition with emerge easing for the back-face reveal */
      transition:
        opacity 0.52s var(--ease-emerge),
        transform 0.52s var(--ease-emerge),
        filter 0.52s ease;
    }

    .card.flipped .card-front {
      opacity: 0;
      transform: translateY(-12px) scale(0.988);
      filter: blur(6px);
      pointer-events: none;
    }

    .card.flipped .card-back {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
      pointer-events: auto;
    }

    /* ═══════════════════════════════════════════════════════════
       CARD FRONT ELEMENTS
    ═══════════════════════════════════════════════════════════ */
    .ornament {
      color: var(--accent-soft);
      font-size: 30px;
      line-height: 1;
      margin-bottom: 20px;
      text-shadow: 0 0 32px var(--mood), 0 0 58px var(--mood);
      user-select: none;
      animation: glowBreath 6s ease-in-out infinite;
      transition: color 0.5s ease;
    }

    .divider {
      width: 48px;
      height: 1px;
      margin: 15px auto;
      flex-shrink: 0;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.58;
      transition: background 0.6s ease;
    }

    .card-prompt {
      max-width: 22ch;
      color: var(--text-muted);
      font-family: var(--font-answer);
      font-size: clamp(17px, 2.6vw, 23px);
      font-style: italic;
      font-weight: 500;
      line-height: 1.52;
      text-wrap: balance;
      transition: color 0.5s ease;
    }

    :lang(zh-Hans) .card-prompt {
      max-width: 14em;
      font-family: 'Noto Serif SC', 'Songti SC', 'STSong', serif;
      font-style: normal;
      font-size: clamp(15px, 2.2vw, 20px);
      line-height: 1.78;
    }

    .card-hint {
      margin-top: 20px;
      color: var(--text-faint);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      line-height: 1.4;
      font-style: italic;
    }

    /* ═══════════════════════════════════════════════════════════
       CARD BACK ELEMENTS — ANSWER DISPLAY
    ═══════════════════════════════════════════════════════════ */
    .answer-text {
      max-width: 18ch;
      color: var(--accent-soft);
      font-family: var(--font-answer);
      font-size: clamp(23px, 4vw, 38px);
      font-weight: 600;
      font-style: italic;
      line-height: 1.22;
      text-align: center;
      text-wrap: balance;
      text-shadow: 0 0 28px var(--mood);
      opacity: 1;
      transform: translateY(0);
      transition:
        opacity 0.52s var(--ease-liquid),
        transform 0.52s var(--ease-liquid),
        color 0.5s ease;
    }

    .answer-text.is-revealing {
      opacity: 0;
      transform: translateY(10px);
    }

    :lang(zh-Hans) .answer-text {
      max-width: 11em;
      font-family: 'Noto Serif SC', 'Songti SC', 'STSong', serif;
      font-style: normal;
      font-size: clamp(19px, 3.4vw, 32px);
      line-height: 1.52;
    }

    .answer-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      margin-top: 6px;
    }

    .answer-label {
      color: var(--text-faint);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .answer-count {
      color: var(--text-faint);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.05em;
      opacity: 0.68;
    }

    /* ═══════════════════════════════════════════════════════════
       ACTION ZONE — BUTTON + HELPER
    ═══════════════════════════════════════════════════════════ */
    .action-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 13px;
      margin-top: 6px;
      padding: 0 16px;
      width: 100%;
    }

    /* ═══════════════════════════════════════════════════════════
       ASK BUTTON — SCULPTED PILL (secondary glass object)
    ═══════════════════════════════════════════════════════════ */
    .ask-btn {
      position: relative;
      isolation: isolate;
      min-height: 54px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: var(--r-pill);
      padding: 0 44px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.52), transparent 38%),
        linear-gradient(148deg, var(--accent-soft), var(--accent) 54%, var(--accent-deep));
      color: var(--button-text);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1;
      box-shadow: var(--shadow-button);
      transition:
        transform 0.3s var(--ease-liquid),
        box-shadow 0.3s ease,
        filter 0.3s ease,
        background 0.7s ease;
    }

    /* Shimmer sweep on button */
    .ask-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        112deg,
        transparent 0 22%,
        rgba(255, 255, 255, 0.42) 36%,
        transparent 50% 100%
      );
      transform: translateX(-130%);
      pointer-events: none;
      transition: transform 0.72s var(--ease-liquid);
    }

    .ask-btn:hover {
      transform: translateY(-4px);
      filter: saturate(1.06);
      box-shadow: 0 28px 72px var(--mood), inset 0 1px 0 rgba(255,255,255,0.72);
    }

    .ask-btn:hover::before {
      transform: translateX(130%);
    }

    .ask-btn:active,
    .ask-btn.is-pressed {
      transform: translateY(-1px) scale(0.978);
      transition-duration: 0.10s;
    }

    /* ═══════════════════════════════════════════════════════════
       HELPER COPY
    ═══════════════════════════════════════════════════════════ */
    .helper-copy {
      color: var(--text-faint);
      font-size: 12px;
      font-weight: 400;
      line-height: 1.68;
      text-align: center;
      text-wrap: balance;
      max-width: 34ch;
    }

    /* ═══════════════════════════════════════════════════════════
       KEYFRAME ANIMATIONS
    ═══════════════════════════════════════════════════════════ */
    @keyframes starDrift {
      from { transform: translate3d(-1%, -0.8%, 0); }
      to   { transform: translate3d(1%,   0.8%, 0); }
    }

    @keyframes glowBreath {
      0%, 100% { opacity: 0.62; transform: scale(1);     }
      50%       { opacity: 1.00; transform: scale(1.025); }
    }

    @keyframes slowTurn {
      to { transform: rotate(360deg); }
    }

    /* ═══════════════════════════════════════════════════════════
       REDUCED MOTION
    ═══════════════════════════════════════════════════════════ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* ═══════════════════════════════════════════════════════════
       RESPONSIVE — MOBILE SMALL (< 480px)
    ═══════════════════════════════════════════════════════════ */
    @media (max-width: 480px) {
      .utility-rail { justify-content: center; }

      .cat-tab {
        padding: 7px 12px;
        font-size: 11px;
      }

      :lang(zh-Hans) .cat-tab {
        padding: 7px 10px;
        font-size: 12px;
      }

      .oracle-stage { padding: 18px 0; }

      /* Card constrained on small screens — cap height to fit viewport comfortably */
      .card { max-height: 420px; }

      .card-face { padding: 34px 24px; }

      .helper-copy { display: none; }

      .action-zone { gap: 12px; margin-top: 4px; }

      .ask-btn { min-height: 50px; padding: 0 34px; }
    }

    /* ═══════════════════════════════════════════════════════════
       RESPONSIVE — EXTRA SMALL (< 360px)
    ═══════════════════════════════════════════════════════════ */
    @media (max-width: 360px) {
      .cat-tab { padding: 6px 9px; font-size: 11px; }
      .ask-btn { padding: 0 26px; }
    }

    /* ═══════════════════════════════════════════════════════════
       RESPONSIVE — DESKTOP (> 940px)
    ═══════════════════════════════════════════════════════════ */
    @media (min-width: 941px) {
      .oracle-column {
        max-width: 580px;
        padding: 14px 0 10px;
      }

      .oracle-stage { padding: 30px 0; }

      .book-title { margin-bottom: 13px; }

      .action-zone {
        gap: 16px;
        margin-top: 8px;
      }

      .helper-copy { display: block; }
    }

    /* ═══════════════════════════════════════════════════════════
       RESPONSIVE — SHORT SCREENS (landscape / compact height)
    ═══════════════════════════════════════════════════════════ */
    @media (max-height: 720px) and (min-width: 481px) {
      .oracle-column { padding: 6px 0 4px; }
      .oracle-stage  { padding: 14px 0; }
      .title-block   { margin-bottom: 10px; }
      .category-control { margin-bottom: 12px; }
      .action-zone   { gap: 10px; margin-top: 2px; }
    }
  </style>
</head>

<body>
  <div class="cosmos" aria-hidden="true"></div>
  <div class="ambient-orbit" aria-hidden="true"></div>

  <!-- Hidden legacy elements preserved for JS compatibility -->
  <span id="brand-label" hidden></span>
  <div id="footer" hidden></div>

  <div class="app-shell">

    <header class="utility-rail" aria-label="Settings">
      <div class="utility-group">
        <button class="util-btn" type="button" id="theme-toggle">☀ Day</button>
        <div class="util-sep" aria-hidden="true"></div>
        <button class="util-btn" type="button" id="lang-toggle">中文</button>
      </div>
    </header>

    <main class="oracle-column">

      <section class="title-block" aria-labelledby="book-title">
        <h1 class="book-title" id="book-title">The Book of Answers</h1>
        <div class="eyebrow" id="book-eyebrow">A quiet answer awaits</div>
      </section>

      <nav class="category-control" aria-label="Book category">
        <button class="cat-tab active" type="button" data-book="classic"      id="tab-classic"      aria-pressed="true" ><span>Classic</span></button>
        <button class="cat-tab"        type="button" data-book="audit"         id="tab-audit"         aria-pressed="false"><span>Audit Life</span></button>
        <button class="cat-tab"        type="button" data-book="relationship"  id="tab-relationship"  aria-pressed="false"><span>Heart</span></button>
      </nav>

      <section class="oracle-stage" aria-label="Answer reveal">
        <div class="card-scene" id="card-scene" role="button" tabindex="0" aria-label="Reveal an answer">
          <div class="card" id="card">

            <div class="card-face card-front">
              <div class="ornament" id="card-ornament">&#10022;</div>
              <div class="divider"></div>
              <div class="card-prompt" id="card-prompt">Hold your question in mind, then reveal your answer.</div>
              <div class="divider"></div>
              <div class="card-hint" id="card-hint">tap to reveal</div>
            </div>

            <div class="card-face card-back">
              <div class="divider"></div>
              <div class="answer-text" id="answer-text" aria-live="polite"></div>
              <div class="divider"></div>
              <div class="answer-meta">
                <span class="answer-label" id="answer-label">Answer</span>
                <span class="answer-count" id="answer-count"></span>
              </div>
            </div>

          </div>
        </div>
      </section>

      <div class="action-zone">
        <button class="ask-btn" type="button" id="ask-btn">Ask the Book</button>
        <p class="helper-copy" id="helper-copy">Let the question settle. When the surface feels still, ask once.</p>
      </div>

    </main>
  </div>

  <script src="./answers.js"></script>
  <script>
  // ── Data ───────────────────────────────────────────────────────────────────
  const BOOKS = window.BOOKS;
  if (!BOOKS) {
    throw new Error("Answer data failed to load.");
  }

  // ── State ──────────────────────────────────────────────────────────────────
  const state = {
    theme:    "dark",
    lang:     "en",
    book:     "classic",
    flipped:  false,
    lastIdx:  -1
  };

  const UI_TEXT = {
    en: {
      eyebrow: {
        classic: "A quiet answer awaits",
        audit: "A clearer signal awaits",
        relationship: "A tender answer awaits"
      },
      brand: "Answer Portal",
      helper: "Let the question settle. When the surface feels still, ask once.",
      revealLabel: "Reveal an answer",
      resetLabel: "Close the answer"
    },
    zh: {
      eyebrow: {
        classic: "静候答案",
        audit: "静候明晰",
        relationship: "静候心声"
      },
      brand: "答案之门",
      helper: "让问题先安静下来。等表面平稳时，只问一次。",
      revealLabel: "揭晓答案",
      resetLabel: "合上答案"
    }
  };

  // ── Elements ───────────────────────────────────────────────────────────────
  const $html        = document.documentElement;
  const $card        = document.getElementById("card");
  const $cardScene   = document.getElementById("card-scene");
  const $brandLabel  = document.getElementById("brand-label");
  const $helperCopy  = document.getElementById("helper-copy");
  const $bookEyebrow = document.getElementById("book-eyebrow");
  const $bookTitle   = document.getElementById("book-title");
  const $ornament    = document.getElementById("card-ornament");
  const $prompt      = document.getElementById("card-prompt");
  const $hint        = document.getElementById("card-hint");
  const $answer      = document.getElementById("answer-text");
  const $answerLabel = document.getElementById("answer-label");
  const $answerCount = document.getElementById("answer-count");
  const $askBtn      = document.getElementById("ask-btn");
  const $langToggle  = document.getElementById("lang-toggle");
  const $themeToggle = document.getElementById("theme-toggle");
  const $footer      = document.getElementById("footer");
  const $tabs        = document.querySelectorAll(".cat-tab");
  const $tabClassic  = document.getElementById("tab-classic");
  const $tabAudit    = document.getElementById("tab-audit");
  const $tabRel      = document.getElementById("tab-relationship");

  // ── Helpers ────────────────────────────────────────────────────────────────
  function currentData() {
    return BOOKS[state.book][state.lang];
  }

  function randomAnswer() {
    const list = currentData().answers;
    let idx;
    do { idx = Math.floor(Math.random() * list.length); }
    while (idx === state.lastIdx && list.length > 1);
    state.lastIdx = idx;
    return list[idx];
  }

  function setButtonLabel(button, label) {
    const textNode = button.querySelector("span");
    if (textNode) { textNode.textContent = label; }
    else          { button.textContent   = label; }
  }

  function updateAnswerMeta() {
    const total = currentData().answers.length;
    if ($answerCount) {
      $answerCount.textContent = state.lang === "en"
        ? `${state.lastIdx + 1} of ${total}`
        : `${state.lastIdx + 1} / ${total}`;
    }
    if ($answerLabel) {
      $answerLabel.textContent = state.lang === "en" ? "Answer" : "答语";
    }
  }

  // ── Render UI ──────────────────────────────────────────────────────────────
  function render(fadeTitle = false) {
    const d  = currentData();
    const ui = UI_TEXT[state.lang];

    $html.setAttribute("data-theme", state.theme);
    $html.setAttribute("data-book",  state.book);

    // Title (with optional fade transition)
    if (fadeTitle) {
      $bookTitle.classList.add("is-changing");
      setTimeout(() => {
        $bookTitle.textContent = d.name;
        $bookTitle.classList.remove("is-changing");
      }, 240);
    } else {
      $bookTitle.textContent = d.name;
    }

    $bookEyebrow.textContent = ui.eyebrow[state.book];
    if ($brandLabel) $brandLabel.textContent = ui.brand;
    if ($helperCopy) $helperCopy.textContent = ui.helper;

    // Card front
    $ornament.textContent = d.ornament;
    $prompt.textContent   = d.prompt;
    $hint.textContent     = d.hint;

    // Button label
    $askBtn.textContent = state.flipped ? d.againBtn : d.askBtn;
    $cardScene.setAttribute("aria-label", state.flipped ? ui.resetLabel : ui.revealLabel);

    // Re-render answer in new language if visible
    if (state.flipped && state.lastIdx >= 0) {
      $answer.textContent = BOOKS[state.book][state.lang].answers[state.lastIdx];
      updateAnswerMeta();
    }

    // Category tabs
    setButtonLabel($tabClassic, state.lang === "en" ? "Classic"    : "经典");
    setButtonLabel($tabAudit,   state.lang === "en" ? "Audit Life" : "审计人生");
    setButtonLabel($tabRel,     state.lang === "en" ? "Heart"      : "心语");
    $tabs.forEach(tab => {
      const isActive = tab.dataset.book === state.book;
      tab.classList.toggle("active", isActive);
      tab.setAttribute("aria-pressed", String(isActive));
    });

    // Utility toggles
    $langToggle.textContent  = state.lang  === "en"    ? "中文"    : "English";
    $themeToggle.textContent = state.theme === "light"
      ? (state.lang === "en" ? "☽ Night" : "☽ 夜间")
      : (state.lang === "en" ? "☀ Day"   : "☀ 日间");

    // Legacy footer (hidden)
    if ($footer) $footer.textContent = d.name;

    // lang attribute for CSS :lang() selectors
    $html.lang = state.lang === "en" ? "en" : "zh-Hans";
  }

  // ── Flip Logic ─────────────────────────────────────────────────────────────
  function flipToAnswer() {
    // Phase 1 — Gather (150ms): border brightens, energy builds
    $card.classList.add("gathering");

    setTimeout(() => {
      $card.classList.remove("gathering");

      // Phase 2 — Portal opens: cross-fade front → back
      $answer.classList.add("is-revealing");
      $answer.textContent = randomAnswer();
      state.flipped = true;
      $card.classList.add("flipped");
      $askBtn.textContent = currentData().againBtn;
      render(false);

      // Phase 3 — Answer rises into view (staggered)
      window.setTimeout(() => {
        $answer.classList.remove("is-revealing");
        updateAnswerMeta();
      }, 360);

    }, 150);
  }

  function flipToFront(shouldRender = true) {
    state.flipped = false;
    $card.classList.remove("flipped");
    $askBtn.textContent = currentData().askBtn;
    if (shouldRender) render(false);
  }

  function handleAsk() {
    state.flipped ? flipToFront() : flipToAnswer();
  }

  // ── Events ─────────────────────────────────────────────────────────────────
  $cardScene.addEventListener("click", handleAsk);
  $askBtn.addEventListener("click", (e) => { e.stopPropagation(); handleAsk(); });

  $cardScene.addEventListener("keydown", (e) => {
    if (e.key !== "Enter" && e.key !== " ") return;
    e.preventDefault();
    handleAsk();
  });

  $askBtn.addEventListener("pointerdown",  () => $askBtn.classList.add("is-pressed"));
  ["pointerup", "pointercancel", "pointerleave"].forEach(ev =>
    $askBtn.addEventListener(ev, () => $askBtn.classList.remove("is-pressed"))
  );

  $tabs.forEach(tab => {
    tab.addEventListener("click", () => {
      const book = tab.dataset.book;
      if (book === state.book) return;
      state.book    = book;
      state.lastIdx = -1;
      if (state.flipped) flipToFront(false);
      render(true);
    });
  });

  $langToggle.addEventListener("click", () => {
    state.lang = state.lang === "en" ? "zh" : "en";
    render(false);
  });

  $themeToggle.addEventListener("click", () => {
    state.theme = state.theme === "light" ? "dark" : "light";
    render(false);
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  render(false);

  // ── PWA: Register Service Worker ───────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
  </script>

</body>
</html>
