  <style>
    /* ── Theme Tokens ─────────────────────────────── */
    :root {
      --bg:           #f7f3eb;
      --surface:      #ede7d4;
      --card-bg:      #fdfaf3;
      --gold:         #9a7b2e;
      --gold-light:   #c4972f;
      --text:         #1c1a15;
      --text-muted:   #7a7060;
      --text-faint:   #b0a898;
      --border:       rgba(154,123,46,0.22);
      --shadow:       0 24px 64px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
      --pill-bg:      #eae3d0;
      --pill-active:  #9a7b2e;
      --pill-text:    #fdfaf3;
      --btn-bg:       #9a7b2e;
      --btn-text:     #fdfaf3;
    }

    [data-theme="dark"] {
      --bg:           #09090d;
      --surface:      #111117;
      --card-bg:      #16161f;
      --gold:         #d4af37;
      --gold-light:   #edd96a;
      --text:         #f0e8d4;
      --text-muted:   #88806e;
      --text-faint:   #524c42;
      --border:       rgba(212,175,55,0.18);
      --shadow:       0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(212,175,55,0.08);
      --pill-bg:      #1c1c28;
      --pill-active:  #d4af37;
      --pill-text:    #09090d;
      --btn-bg:       #d4af37;
      --btn-text:     #09090d;
    }

    /* ── Reset ────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Body ─────────────────────────────────────── */
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px 60px;
      transition: background 0.5s ease, color 0.5s ease;
    }

    [data-theme="dark"] body {
      background: radial-gradient(ellipse at 50% 0%, #16162a 0%, #09090d 65%);
    }

    /* ── Top Bar ──────────────────────────────────── */
    .top-bar {
      width: 100%;
      max-width: 500px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-bottom: 44px;
    }

    .top-btn {
      background: var(--pill-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.25s, border-color 0.25s, background 0.25s;
      user-select: none;
    }

    .top-btn:hover {
      color: var(--gold);
      border-color: var(--gold);
    }

    /* ── Main Container ───────────────────────────── */
    .container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Book Tabs ────────────────────────────────── */
    .book-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 52px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .book-tab {
      background: none;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 9px 20px;
      font-size: 12.5px;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.3s ease;
      user-select: none;
    }

    .book-tab.active {
      background: var(--pill-active);
      border-color: var(--pill-active);
      color: var(--pill-text);
      font-weight: 600;
    }

    .book-tab:hover:not(.active) {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* ── Book Title ───────────────────────────────── */
    .book-title {
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 36px;
      text-align: center;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    /* ── Card Scene ───────────────────────────────── */
    .card-scene {
      perspective: 1400px;
      width: 300px;
      height: 400px;
      margin-bottom: 44px;
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.9s cubic-bezier(0.45, 0.05, 0.15, 1.0);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 14px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 44px 36px;
      transition: background 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
    }

    .card-back {
      transform: rotateY(180deg);
    }

    /* subtle hover lift */
    .card-scene:hover .card:not(.flipped) .card-front {
      box-shadow: var(--shadow), 0 0 0 1px var(--border);
    }

    /* ── Card Front ───────────────────────────────── */
    .ornament {
      font-size: 28px;
      color: var(--gold);
      margin-bottom: 20px;
      line-height: 1;
      user-select: none;
    }

    .divider {
      width: 36px;
      height: 1px;
      background: var(--gold);
      opacity: 0.45;
      margin: 14px auto;
      flex-shrink: 0;
    }

    .card-prompt {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 15px;
      line-height: 1.75;
      color: var(--text-muted);
      text-align: center;
    }

    .card-hint {
      margin-top: 20px;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    /* ── Card Back ────────────────────────────────── */
    .answer-text {
      font-family: 'Playfair Display', serif;
      font-size: 21px;
      font-weight: 600;
      line-height: 1.55;
      text-align: center;
      color: var(--text);
      transition: color 0.5s ease;
    }

    [data-theme="dark"] .answer-text {
      color: var(--gold);
    }

    /* ── Ask Button ───────────────────────────────── */
    .ask-btn {
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 40px;
      padding: 15px 44px;
      font-size: 12.5px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.5s ease, color 0.5s ease;
      user-select: none;
    }

    .ask-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(154,123,46,0.28);
    }

    [data-theme="dark"] .ask-btn:hover {
      box-shadow: 0 10px 28px rgba(212,175,55,0.22);
    }

    .ask-btn:active {
      transform: translateY(-1px);
    }

    /* ── Footer ───────────────────────────────────── */
    .footer {
      margin-top: 64px;
      font-size: 10.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-faint);
      text-align: center;
    }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 380px) {
      .card-scene { width: 270px; height: 360px; }
      .book-tab { padding: 8px 14px; font-size: 11.5px; }
    }
  </style>
</head>

  // ── State ──────────────────────────────────────────────────────────────────
  const state = {
    theme:    "light",
    lang:     "en",
    book:     "classic",
    flipped:  false,
    lastIdx:  -1
  };

  // ── Elements ───────────────────────────────────────────────────────────────
  const $html        = document.documentElement;
  const $card        = document.getElementById("card");
  const $cardScene   = document.getElementById("card-scene");
  const $bookTitle   = document.getElementById("book-title");
  const $ornament    = document.getElementById("card-ornament");
  const $prompt      = document.getElementById("card-prompt");
  const $hint        = document.getElementById("card-hint");
  const $answer      = document.getElementById("answer-text");
  const $askBtn      = document.getElementById("ask-btn");
  const $langToggle  = document.getElementById("lang-toggle");
  const $themeToggle = document.getElementById("theme-toggle");
  const $footer      = document.getElementById("footer");
  const $tabs        = document.querySelectorAll(".book-tab");
  const $tabClassic  = document.getElementById("tab-classic");
  const $tabAudit    = document.getElementById("tab-audit");
  const $tabRel      = document.getElementById("tab-relationship");

  // ── Helpers ────────────────────────────────────────────────────────────────
  function currentData() {
    return BOOKS[state.book][state.lang];
  }

  function randomAnswer() {
    const list = currentData().answers;
    let idx;
    do { idx = Math.floor(Math.random() * list.length); }
    while (idx === state.lastIdx && list.length > 1);
    state.lastIdx = idx;
    return list[idx];
  }

  // ── Render UI ──────────────────────────────────────────────────────────────
  function render(fadeTitle = false) {
    const d = currentData();

    // Title
    if (fadeTitle) {
      $bookTitle.style.opacity = "0";
      setTimeout(() => {
        $bookTitle.textContent = d.name;
        $bookTitle.style.opacity = "1";
      }, 280);
    } else {
      $bookTitle.textContent = d.name;
    }

    // Card front
    $ornament.textContent = d.ornament;
    $prompt.textContent   = d.prompt;
    $hint.textContent     = d.hint;

    // Button
    $askBtn.textContent = state.flipped ? d.againBtn : d.askBtn;

    // If answer is visible, re-render it in new language (same index)
    if (state.flipped && state.lastIdx >= 0) {
      $answer.textContent = BOOKS[state.book][state.lang].answers[state.lastIdx];
    }

    // Tabs
    $tabClassic.textContent = state.lang === "en" ? "Classic"    : "经典";
    $tabAudit.textContent   = state.lang === "en" ? "Audit Life" : "审计人生";
    $tabRel.textContent     = state.lang === "en" ? "Heart"      : "心语";

    // Toggles
    $langToggle.textContent  = state.lang   === "en"    ? "中文"    : "English";
    $themeToggle.textContent = state.theme  === "light"
      ? (state.lang === "en" ? "☽ Night" : "☽ 夜间")
      : (state.lang === "en" ? "☀ Day"   : "☀ 日间");

    // Footer
    $footer.textContent = d.name;

    // html lang attribute
    $html.lang = state.lang === "en" ? "en" : "zh-Hans";
  }

  // ── Flip Logic ─────────────────────────────────────────────────────────────
  function flipToAnswer() {
    $answer.textContent = randomAnswer();
    state.flipped = true;
    $card.classList.add("flipped");
    $askBtn.textContent = currentData().againBtn;
  }

  function flipToFront() {
    state.flipped = false;
    $card.classList.remove("flipped");
    $askBtn.textContent = currentData().askBtn;
  }

  function handleAsk() {
    state.flipped ? flipToFront() : flipToAnswer();
  }

  // ── Events ─────────────────────────────────────────────────────────────────
  $cardScene.addEventListener("click", handleAsk);
  $askBtn.addEventListener("click", (e) => { e.stopPropagation(); handleAsk(); });

  $tabs.forEach(tab => {
    tab.addEventListener("click", () => {
      const book = tab.dataset.book;
      if (book === state.book) return;
      state.book    = book;
      state.lastIdx = -1;
      if (state.flipped) flipToFront();
      $tabs.forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      render(true);
    });
  });

  $langToggle.addEventListener("click", () => {
    state.lang = state.lang === "en" ? "zh" : "en";
    render(false);
  });

  $themeToggle.addEventListener("click", () => {
    state.theme = state.theme === "light" ? "dark" : "light";
    $html.setAttribute("data-theme", state.theme);
    render(false);
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  render(false);

  // ── PWA: Register Service Worker ───────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
